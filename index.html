<!DOCTYPE html>
<html>
<head>
  <title>Flappy Friends 😂</title>
</head>

<body style="margin:0; overflow:hidden; background:#70c5ce;">
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = 400;
canvas.height = 600;

// Load images
const birdImg = new Image();
birdImg.src = "bird.png";

const pipeImg = new Image();
pipeImg.src = "pole.png";

let loaded = 0;
birdImg.onload = () => loaded++;
pipeImg.onload = () => loaded++;

// Start game after images load
function startGame() {

let bird = {
  x: 80,
  y: 250,
  w: 50,
  h: 50,
  gravity: 0.5,
  lift: -8,
  velocity: 0
};

let pipes = [];
let frame = 0;
let score = 0;

// Controls
document.addEventListener("keydown", (e) => {
  if (e.code === "Space") {
    bird.velocity = bird.lift;
  }
});

function createPipe() {
  let gap = 150;
  let top = Math.random() * 300 + 50;

  pipes.push({
    x: canvas.width,
    top: top,
    bottom: top + gap,
    width: 80
  });
}

function update() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Bird
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  ctx.drawImage(birdImg, bird.x, bird.y, bird.w, bird.h);

  // Pipes (friend faces 😂)
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];

    // Top pipe
    ctx.drawImage(pipeImg, p.x, 0, p.width, p.top);

    // Bottom pipe
    ctx.drawImage(pipeImg, p.x, p.bottom, p.width, canvas.height - p.bottom);

    p.x -= 3;

    // Collision
    if (
      bird.x < p.x + p.width &&
      bird.x + bird.w > p.x &&
      (bird.y < p.top || bird.y + bird.h > p.bottom)
    ) {
      alert("Game Over 😂 Score: " + score);
      location.reload();
    }

    // Score
    if (p.x === bird.x) score++;
  }

  pipes = pipes.filter(p => p.x + p.width > 0);

  frame++;
  if (frame % 90 === 0) createPipe();

  // Score text
  ctx.fillStyle = "black";
  ctx.font = "30px Arial";
  ctx.fillText("Score: " + score, 10, 40);

  requestAnimationFrame(update);
}

// Wait until images load
let check = setInterval(() => {
  if (loaded === 2) {
    clearInterval(check);
    startGame();
  }
}, 100);

</script>
</body>
</html>
